
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aminlogic</title>

<style>

body {
    margin: 0;
    padding: 0;
    font-family: Georgia, serif;
    background: #0f0f0f;
    color: #f5f5f5;
    text-align: center;
}

/* Container */
.container {
    width: 95%;
    max-width: 700px;
    margin: auto;
    padding: 20px 10px;
}

/* Profile Image */
.profile-img {
    width: 150px;              /* BEST MOBILE SIZE */
    max-width: 70%;            /* prevents overflow */
    height: auto;
    border-radius: 50%;
    margin-top: 20px;
}

/* Title */
h1 {
    font-size: 24px;
    margin: 15px 0 5px;
}

.subtitle {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 20px;
}

/* Posts Section */
.posts-box {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 12px;
    text-align: left;
    white-space: pre-wrap;     /* SHOWS posts.txt EXACTLY */
    word-wrap: break-word;
    overflow-wrap: break-word;
    font-size: 14px;
}

/* Footer */
footer {
    margin-top: 30px;
    font-size: 12px;
    opacity: 0.6;
}

</style>
</head>

<body>

<div class="container">

    <!-- YOUR IMAGE -->
    <img src="yourimage.jpg" alt="Aminlogic" class="profile-img">

    <h1>Aminlogic</h1>
    <div class="subtitle">Mystic • Creator • Digital Philosopher</div>

    <!-- POSTS.TXT DISPLAY -->
    <div class="posts-box">
        <script>
            fetch('posts.txt')
            .then(response => response.text())
            .then(data => {
                document.querySelector('.posts-box').textContent = data;
            });
        </script>
    </div>

    <footer>
        © 2026 Aminlogic
    </footer>

</div>

</body>
</html>
