
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aminlogic</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* ===== TOP SECTION ===== */
.top-section {
    text-align: center;
    padding: 20px 10px;
}

.top-section img {
    width: 140px;          /* IMAGE SIZE FIXED */
    max-width: 60%;
    height: auto;
    border-radius: 50%;
}

.top-section h1 {
    margin: 10px 0 5px;
}

.top-section p {
    margin: 0;
    font-size: 14px;
    opacity: 0.8;
}

/* ===== BUTTONS ===== */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px;
    margin-top: 20px;
}

.buttons a {
    text-decoration: none;
    background: #222;
    padding: 12px;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

.buttons a:hover {
    background: #333;
}

/* ===== POSTS SECTION ===== */
.posts {
    margin: 30px 15px;
    padding: 15px;
    background: #1a1a1a;
    border-radius: 10px;
    white-space: pre-wrap;        /* SHOWS posts.txt EXACTLY */
    word-wrap: break-word;
    overflow-wrap: break-word;
    font-size: 14px;
}

/* ===== MOBILE SAFETY ===== */
* {
    box-sizing: border-box;
}

img {
    max-width: 100%;
    height: auto;
}

</style>
</head>

<body>

<div class="top-section">
    <img src="yourimage.jpg" alt="Aminlogic">
    <h1>Aminlogic</h1>
    <p>Mystic • Creator • Digital Philosopher</p>
</div>

<div class="buttons">
    <a href="#">Instagram</a>
    <a href="#">TikTok</a>
    <a href="#">YouTube</a>
</div>

<div class="posts" id="postsBox">
Loading posts...
</div>

<script>
fetch("posts.txt")
.then(response => response.text())
.then(data => {
    document.getElementById("postsBox").textContent = data;
});
</script>

</body>
</html>
